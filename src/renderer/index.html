<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fabric</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">Fabric</span>
    <span class="connection-indicator" id="connection-indicator" title="Engine connection">
      <span class="connection-dot"></span>
      <span class="connection-label">Connected</span>
    </span>
    <span class="titlebar-subtitle" id="titlebar-status"></span>
    <span class="titlebar-shortcut" title="Command bar">&#8984;K</span>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-item active" data-view="chat">
          <span class="sidebar-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3.5A1.5 1.5 0 013.5 2h9A1.5 1.5 0 0114 3.5v7a1.5 1.5 0 01-1.5 1.5H6l-2.5 2V12H3.5A1.5 1.5 0 012 10.5v-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M5.5 6.5h5M5.5 9h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
          <span>Chat</span>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Observability</div>
        <div class="sidebar-item" data-view="needs-you">
          <span class="sidebar-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 4.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11" r="0.75" fill="currentColor"/></svg></span>
          <span>Needs you</span>
          <span class="sidebar-badge" id="attention-count">2</span>
        </div>
        <div class="sidebar-item" data-view="all-work">
          <span class="sidebar-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 7h6M5 10h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
          <span>All work</span>
        </div>
        <div class="sidebar-item" data-view="activity">
          <span class="sidebar-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h3l1.5-4 3 8L11 8h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span>Activity</span>
          <span class="sidebar-badge" id="error-count" style="display: none; background: var(--red);">0</span>
        </div>
        <div class="sidebar-item" data-view="agents">
          <span class="sidebar-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 14c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
          <span>Agents</span>
        </div>
        <div class="sidebar-item" data-view="graph">
          <span class="sidebar-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="4" cy="4" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="4" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="12" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 5.5L7 10.5M10.5 5.5L9 10.5" stroke="currentColor" stroke-width="1.2"/></svg></span>
          <span>Graph</span>
        </div>
        <div class="sidebar-item" data-view="costs">
          <span class="sidebar-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M5.5 4.5C5.5 3.67 6.62 3 8 3s2.5.67 2.5 1.5S9.38 6 8 6 5.5 6.67 5.5 7.5 6.62 9 8 9s2.5.67 2.5 1.5S9.38 12 8 12s-2.5-.67-2.5-1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
          <span>Costs</span>
        </div>
        <div class="sidebar-item" data-view="settings">
          <span class="sidebar-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
          <span>Settings</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section sidebar-goals-section">
        <div class="sidebar-goals-header">
          <div class="sidebar-label">Goals</div>
          <div id="sidebar-goal-counts" class="sidebar-goal-counts"></div>
        </div>
        <div id="sidebar-goal-stats" class="sidebar-goal-stats"></div>
        <div id="sidebar-goals"></div>
      </div>

      <div class="sidebar-rail" id="sidebar-rail" title="Drag to resize sidebar"></div>

      <div class="sidebar-footer">
        <div class="footer-row footer-row-primary">
          <div class="footer-stat">
            <div class="footer-dot footer-dot-pulse" style="background: var(--green)"></div>
            <span id="footer-agents">-- agents</span>
          </div>
          <div class="footer-stat">
            <span id="footer-spend">$0.00</span>
          </div>
          <div class="footer-stat">
            <span id="footer-tokens" class="footer-tokens">-- tok</span>
          </div>
          <button class="dark-mode-btn" id="dark-mode-toggle" title="Toggle dark mode (&#8984;D)"><svg id="theme-icon-moon" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13.5 8.5a5.5 5.5 0 01-7-7A5.5 5.5 0 108 14a5.5 5.5 0 005.5-5.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><svg id="theme-icon-sun" width="14" height="14" viewBox="0 0 16 16" fill="none" style="display:none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        </div>
        <div class="footer-token-bar" id="footer-token-bar" title="Token budget usage">
          <div class="footer-token-bar-fill" id="footer-token-bar-fill" style="width: 0%"></div>
        </div>
        <div class="footer-row footer-row-secondary">
          <span id="footer-model" class="footer-model">sonnet-4</span>
          <span id="footer-budget-label" class="footer-budget-label" style="font-family:var(--font-mono);font-size:10px;"></span>
          <span id="footer-goals-summary" class="footer-goals-summary"></span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="view-header">
        <div class="view-title" id="view-title">Needs you</div>
        <div class="view-subtitle" id="view-subtitle">Things that need a human decision</div>
      </div>
      <div class="feed" id="feed"></div>
    </main>
  </div>

  <!-- Command bar overlay -->
  <div class="cmdk-overlay" id="cmdk-overlay">
    <div class="cmdk">
      <div class="cmdk-input-wrap">
        <span class="cmdk-search-icon">&#8981;</span>
        <input class="cmdk-input" id="cmdk-input" type="text" placeholder="Ask, search, or &quot;create: fix login bug&quot;..." autocomplete="off" spellcheck="false" />
        <span class="cmdk-hint">esc</span>
      </div>
      <div class="cmdk-results" id="cmdk-results"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Detail slide-over -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-panel" id="detail-panel"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
