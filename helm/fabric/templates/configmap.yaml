apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fabric.fullname" . }}
  labels:
    {{- include "fabric.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  DEFAULT_BUDGET_USD: {{ .Values.config.defaultBudgetUsd | quote }}
  DEFAULT_MAX_TURNS: {{ .Values.config.defaultMaxTurns | quote }}
  DEFAULT_MODEL: {{ .Values.config.defaultModel | quote }}
