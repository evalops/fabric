apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fabric.fullname" . }}
  labels:
    {{- include "fabric.labels" . | nindent 4 }}
type: Opaque
data:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ include "fabric.databaseUrl" . | b64enc | quote }}
  PGPASSWORD: {{ .Values.postgresql.password | b64enc | quote }}
  {{- end }}
